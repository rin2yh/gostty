name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: jdx/mise-action@v2

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Metal Toolchain
        run: |
          sudo xcodebuild -runFirstLaunch
          xcodebuild -downloadComponent MetalToolchain

      - name: Build ghostty static library
        working-directory: ghostty
        run: zig build -Dapp-runtime=none -Doptimize=ReleaseSafe

      - name: Build gostty binary
        run: go build -trimpath -ldflags="-s -w" -o gostty ./cmd/terminal

      - name: Package tarball
        run: tar -czf gostty-darwin-arm64.tar.gz gostty

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: gostty-darwin-arm64.tar.gz
          generate_release_notes: true
